services:
  postgres:
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    container_name: study-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study123
      POSTGRES_DB: study_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study -d study_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
