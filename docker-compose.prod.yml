# Production stack — build & run without npm on the host:
#   cp .env.prod.example .env.prod   # fill in secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: study-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-study}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-study_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-study} -d ${POSTGRES_DB:-study_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: study-assistant-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-study}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-study_assistant}?schema=public
      PORT: "3004"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3004"
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
    container_name: study-assistant-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
